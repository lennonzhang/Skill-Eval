<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Eval Review</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1 data-i18n="app.title">Skill Eval Review</h1>
          <p id="batchMeta">No batch loaded</p>
        </div>
        <div class="topbar-actions">
          <label class="language-control">
            <span data-i18n="app.language">Language</span>
            <select id="languageSelect" aria-label="Language">
              <option value="en">EN</option>
              <option value="zh">中文</option>
            </select>
          </label>
          <select id="batchSelect" aria-label="Batch" data-i18n-aria-label="app.batch"></select>
          <label class="archive-toggle">
            <input id="showArchivedBatches" type="checkbox" />
            <span data-i18n="batch.showArchived">Archived</span>
          </label>
          <div class="batch-actions">
            <button id="archiveBatchButton" class="secondary" type="button" data-i18n="batch.archive">Archive</button>
            <button id="restoreBatchButton" class="secondary" type="button" data-i18n="batch.restore">Restore</button>
            <button id="deleteBatchButton" class="danger" type="button" data-i18n="batch.delete">Delete</button>
          </div>
          <div class="import-controls">
            <div class="resource-import">
              <select id="resourceSelect" aria-label="Resource JSON"></select>
              <button id="importButton" type="button" data-i18n="actions.importResource">Import Resource</button>
            </div>
            <div class="upload-import">
              <input id="uploadJsonInput" type="file" accept="application/json,.json" />
              <label class="upload-json-button" for="uploadJsonInput" data-i18n="actions.chooseJson">Choose JSON</label>
              <span id="uploadJsonMeta" data-i18n="upload.none">No file selected</span>
              <button id="uploadImportButton" class="secondary" type="button" data-i18n="actions.importUpload">Import Upload</button>
            </div>
          </div>
          <button id="runProductCheckButton" type="button">Run Product Check</button>
        </div>
      </header>

      <section id="taskProgressStrip" class="task-progress-strip" aria-live="polite"></section>
      <section id="preflightPanel" class="preflight-panel" aria-live="polite"></section>

      <section class="metrics" aria-label="Batch statistics" data-i18n-aria-label="metrics.aria">
        <div class="metric">
          <span data-i18n="metrics.total">Total</span>
          <strong id="totalItems">0</strong>
        </div>
        <div class="metric">
          <span data-i18n="metrics.reviewed">Reviewed</span>
          <strong id="reviewedItems">0</strong>
        </div>
        <div class="metric">
          <span data-i18n="metrics.remaining">Remaining</span>
          <strong id="remainingItems">0</strong>
        </div>
        <div class="metric">
          <span data-i18n="metrics.sourceCache">Source Cache</span>
          <strong id="sourceCache">0</strong>
        </div>
        <div class="metric">
          <span data-i18n="metrics.resultCache">Result Cache</span>
          <strong id="resultCache">0</strong>
        </div>
      </section>

      <section class="filters" aria-label="Review filters" data-i18n-aria-label="filters.aria">
        <label>
          <span data-i18n="filters.model">Model</span>
          <select id="modelFilter"></select>
        </label>
        <label>
          <span data-i18n="filters.status">Status</span>
          <select id="statusFilter">
            <option value="all" data-i18n="filters.allIncludingExcluded">All incl. excluded</option>
            <option value="active" data-i18n="filters.active">All active</option>
            <option value="unreviewed" data-i18n="filters.unreviewed">Unreviewed</option>
            <option value="reviewed" data-i18n="filters.reviewed">Reviewed</option>
            <option value="excluded" data-i18n="filters.excluded">Excluded</option>
          </select>
        </label>
        <label>
          <span data-i18n="filters.search">Search</span>
          <input id="searchInput" type="search" placeholder="Prompt, tag, file..." data-i18n-placeholder="filters.searchPlaceholder" />
        </label>
        <button id="nextUnreviewedButton" type="button" data-i18n="actions.nextUnreviewed">Next Unreviewed</button>
      </section>

      <aside class="stats-panel stats-strip" aria-label="Model statistics" data-i18n-aria-label="stats.aria">
        <div class="stats-block model-stats-block">
          <h2 data-i18n="stats.modelScores">Model Scores</h2>
          <div id="modelStats" class="model-stats-row"></div>
        </div>
        <div class="stats-block tag-stats-block">
          <h2 data-i18n="stats.issueTags">Issue Tags</h2>
          <div id="tagStats" class="tag-stats-row"></div>
        </div>
      </aside>

      <section class="workspace">
        <aside class="queue" aria-label="Items" data-i18n-aria-label="queue.aria">
          <div class="queue-header">
            <div class="queue-title">
              <strong data-i18n="queue.title">Items</strong>
              <span id="visibleCount">0 visible</span>
            </div>
            <button
              id="scrollCurrentItemButton"
              class="queue-current-button"
              type="button"
              data-i18n="actions.scrollCurrent"
              disabled
            >
              Current
            </button>
          </div>
          <div id="itemList" class="item-list"></div>
        </aside>

        <section id="reviewPane" class="review-pane" aria-live="polite">
          <div class="empty-state">
            <h2 data-i18n="empty.initialTitle">Select or import a batch</h2>
            <p data-i18n="empty.initialBody">Use the batch menu or import local resource JSON to begin.</p>
          </div>
        </section>
      </section>
    </main>

    <dialog id="imageDialog">
      <button id="closeDialogButton" type="button" aria-label="Close image" data-i18n="actions.close" data-i18n-aria-label="image.closeAria">Close</button>
      <img id="dialogImage" alt="" />
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
